<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Ninetyz FC</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Ninetyz FC"/>
<meta name="theme-color" content="#0a0a0f"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<style>
html,body{background:#0a0a0f;color:#fff;font-family:-apple-system,sans-serif;margin:0;padding:0;min-height:100vh}
*{box-sizing:border-box}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}
.inp{background:#ffffff10;border:1px solid #ffffff20;border-radius:10px;padding:9px 12px;color:#fff;font-size:13px;outline:none;width:100%;display:block}
.bp{background:linear-gradient(135deg,#00d4aa,#0066ff);border:none;border-radius:10px;padding:10px 16px;color:#fff;font-weight:700;font-size:13px}
.bg{background:#ffffff10;border:1px solid #ffffff20;border-radius:10px;padding:10px 16px;color:#ffffffcc;font-weight:600;font-size:13px}
.card{background:#ffffff08;border-radius:14px;padding:16px;margin-bottom:12px}
.lock{background:#ffffff06;border:1px dashed #ffffff15;border-radius:12px;padding:24px;text-align:center;color:#ffffff40;font-size:13px;margin-bottom:12px}
.by{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:#00d4aa20;color:#00d4aa;border:1px solid #00d4aa40;display:inline-block}
.bn{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:#ff444420;color:#ff8080;border:1px solid #ff444440;display:inline-block}
.sbadge{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;display:inline-block;margin-left:4px}
.sinj{background:#ff444420;color:#ff8080;border:1px solid #ff444440}
.srest{background:#ffaa0020;color:#ffaa00;border:1px solid #ffaa0040}
.sother{background:#ffffff10;color:#ffffff80;border:1px solid #ffffff20}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:#0a0a0f}
#sp{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#0a0a0f}
#ob{min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:24px;display:none;background:#0a0a0f}
#mn{display:none}
#hd{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:16px 16px 14px;border-bottom:1px solid #ffffff10}
#ct{padding:16px 16px 90px}
#tb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0f0f1a;border-top:1px solid #ffffff15;display:flex;padding:6px 0 10px;z-index:100}
#tb button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;color:#fff}
.ti{font-size:18px}.tl{font-size:9px;color:#ffffff40}.tl.on{color:#00d4aa;font-weight:700}
#md{display:none;position:fixed;inset:0;background:#000000cc;z-index:200;align-items:center;justify-content:center;padding:20px}
.mb{background:#1a1a2e;border-radius:16px;padding:24px;width:100%;max-width:360px;border:1px solid #ffffff20;max-height:85vh;overflow-y:auto}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.mbt{background:#ffffff08;border:1px solid #ffffff15;border-radius:14px;padding:16px 10px;text-align:center;color:#fff}
.pd{display:flex;gap:14px;justify-content:center;margin-bottom:28px}
.dt{width:16px;height:16px;border-radius:50%;background:#ffffff20}.dt.on{background:#00d4aa}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.pk{background:#ffffff10;border:1px solid #ffffff15;border-radius:14px;padding:18px 0;font-size:20px;font-weight:700;color:#fff}
.pk.em{background:transparent;border:none}
.ab{max-height:0;overflow:hidden;transition:max-height 0.3s ease}.ab.op{max-height:800px}
.cw{display:flex;flex-direction:column;height:calc(100vh - 170px)}
.cm{flex:1;overflow-y:auto;padding-bottom:8px}
.mme{display:flex;flex-direction:column;align-items:flex-end;margin-bottom:12px}
.mot{display:flex;flex-direction:column;align-items:flex-start;margin-bottom:12px}
.bb{max-width:80%;padding:10px 14px;font-size:13px;line-height:1.5;color:#fff}
.bme{background:linear-gradient(135deg,#00d4aa,#0066ff);border-radius:14px 14px 4px 14px}
.bot{background:#ffffff15;border-radius:14px 14px 14px 4px}
select option{background:#1a1a2e}
.month-tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid #ffffff20;background:transparent;color:#ffffff60;margin-right:6px;margin-bottom:6px}
.month-tab.on{background:#00d4aa;color:#0a0a0f;border-color:#00d4aa}
.hist-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin:1px}
</style>
</head>
<body style="background:#0a0a0f;margin:0;padding:0">
<div id="app" style="background:#0a0a0f;min-height:100vh">
<div id="sp" style="background:#0a0a0f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px">
  <div style="font-size:52px">⚽</div>
  <div style="font-size:14px;color:#ffffff60">불러오는 중...</div>
</div>
<div id="ob"></div>
<div id="mn">
  <div id="hd"></div>
  <div id="ct"></div>
  <div id="tb"></div>
</div>
<div id="md"><div class="mb" id="mb"></div></div>
</div>
<script>
var FB="https://ninetyz-fc-default-rtdb.asia-southeast1.firebasedatabase.app";
function fg(p){return fetch(FB+p+".json").then(function(r){return r.json();});}
function fs(p,d){return fetch(FB+p+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});}
function fp(p,d){return fetch(FB+p+".json",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});}
function fd(p){return fetch(FB+p+".json",{method:"DELETE"});}

var IM=[{id:1,name:"김민형"},{id:2,name:"곽종현"},{id:3,name:"유세원"},{id:4,name:"윤준범"},{id:5,name:"이정기"},{id:6,name:"이원준"},{id:7,name:"오성택"},{id:8,name:"배성록"},{id:9,name:"류진엽"},{id:10,name:"조성훈"},{id:11,name:"한호성"},{id:12,name:"정오성"},{id:13,name:"임종철"},{id:14,name:"김효태"},{id:15,name:"이희승"},{id:16,name:"김성준"}];
var IT={name:"Ninetyz FC",adminId:1,adminPin:"1886"};
var RC={win:"#00d4aa",lose:"#ff4444",draw:"#ffaa00"};
var RL={win:"승",lose:"패",draw:"무"};

// 현재 월 키: "2026-03"
function nowMonth(){var d=new Date();return d.getFullYear()+"-"+(d.getMonth()<9?"0":"")+(d.getMonth()+1);}
function monthLabel(k){var p=k.split("-");return p[0]+"년 "+parseInt(p[1])+"월";}

var S={
  team:null,members:[],matches:[],notices:[],messages:[],actLog:[],
  dues:{}, // {월키: {멤버id: {paid,amount}}}
  user:null,tab:"home",
  pinStep:false,pendingUser:null,pin:"",pinError:false,
  showTE:false,teamEdit:{},
  viewMonth:nowMonth(), // 현재 보고있는 월
  bankText:"",parseResult:null,isParsing:false,
  manualEdit:null,manualAmt:"",
  showAddMem:false,newMemName:"",confirmDel:null,
  attView:null,
  showAddMatch:false,newMatch:{date:"",time:"",location:"",opponent:""},
  resultEdit:null,resultInput:{our:"",opp:""},confirmDelMatch:null,
  newNotice:"",chatText:""
};
try{var _u=localStorage.getItem("fc_u");if(_u)S.user=JSON.parse(_u);}catch(e){}
function su(){try{localStorage.setItem("fc_u",JSON.stringify(S.user));}catch(e){}}
function gn(id){var m=S.members.find(function(x){return x.id==id;});return m?m.name:"?";}
function al(msg){var id=Date.now();fs("/actLog/"+id,{id:id,msg:msg,time:"방금 전"});}
function mk(t,tx){var e=document.createElement(t);if(tx!==undefined)e.textContent=tx;return e;}
function cs(e,s){e.style.cssText=s;}
function dv(c,h){var e=document.createElement("div");if(c)e.className=c;if(h)e.innerHTML=h;return e;}
function sb(st){if(!st)return"";var c=st=="부상"?"sinj":st=="휴식"?"srest":"sother";return'<span class="sbadge '+c+'">'+st+'</span>';}

// 이번달 납부 데이터 가져오기
function mDues(month){return(S.dues&&S.dues[month])||{};}
function mPaid(month,mid){var d=mDues(month);return d[mid]&&d[mid].paid;}
function mAmt(month,mid){var d=mDues(month);return(d[mid]&&d[mid].amount)||0;}

// 월 목록 (dues에 있는 월들 + 현재 월)
function monthList(){
  var months={};months[nowMonth()]=1;
  if(S.dues)Object.keys(S.dues).forEach(function(k){months[k]=1;});
  return Object.keys(months).sort().reverse().slice(0,12);
}

function load(){
  fg("/").then(function(v){
    if(!v)v={};
    if(!v.team){
      fs("/team",IT);
      var o={};IM.forEach(function(m){o[m.id]={id:m.id,name:m.name,paid:false,amount:0,status:""};});
      fs("/members",o);
      S.team=IT;
      S.members=IM.map(function(m){return{id:m.id,name:m.name,paid:false,amount:0,status:""};});
    } else {
      S.team=v.team;
      S.members=v.members?Object.values(v.members).sort(function(a,b){return a.id-b.id;}):[]; 
    }
    S.matches=v.matches?Object.values(v.matches).sort(function(a,b){return(a.date||"").localeCompare(b.date||"");}):[];
    S.notices=v.notices?Object.values(v.notices).sort(function(a,b){return b.id-a.id;}):[];
    S.messages=v.messages?Object.values(v.messages).sort(function(a,b){return a.id-b.id;}):[];
    S.actLog=v.actLog?Object.values(v.actLog).sort(function(a,b){return b.id-a.id;}).slice(0,30):[];
    S.dues=v.dues||{};

    // 매월 1일 자동 초기화 체크
    checkMonthReset(v);

    go();poll();
  }).catch(function(){
    S.team=IT;
    S.members=IM.map(function(m){return{id:m.id,name:m.name,paid:false,amount:0,status:""};});
    go();
  });
}

function checkMonthReset(v){
  var cur=nowMonth();
  // 이번달 데이터가 없으면 자동으로 새 달 시작 (관리자만)
  if(!S.dues[cur]){
    // 새 달 빈 데이터 생성
    var newDues={};
    S.members.forEach(function(m){newDues[m.id]={paid:false,amount:0};});
    S.dues[cur]=newDues;
    fs("/dues/"+cur,newDues);
  }
  S.viewMonth=cur;
}

function poll(){
  setInterval(function(){
    fg("/").then(function(v){
      if(!v||!S.user)return;
      var c=false;
      var nm=v.members?Object.values(v.members).sort(function(a,b){return a.id-b.id;}):[]; if(JSON.stringify(nm)!==JSON.stringify(S.members)){S.members=nm;c=true;}
      var nma=v.matches?Object.values(v.matches).sort(function(a,b){return(a.date||"").localeCompare(b.date||"");}):[];if(JSON.stringify(nma)!==JSON.stringify(S.matches)){S.matches=nma;c=true;}
      var nn=v.notices?Object.values(v.notices).sort(function(a,b){return b.id-a.id;}):[];if(JSON.stringify(nn)!==JSON.stringify(S.notices)){S.notices=nn;c=true;}
      var nms=v.messages?Object.values(v.messages).sort(function(a,b){return a.id-b.id;}):[];if(JSON.stringify(nms)!==JSON.stringify(S.messages)){S.messages=nms;c=true;}
      var nal=v.actLog?Object.values(v.actLog).sort(function(a,b){return b.id-a.id;}).slice(0,30):[];if(JSON.stringify(nal)!==JSON.stringify(S.actLog)){S.actLog=nal;c=true;}
      if(v.team)S.team=v.team;
      if(v.dues&&JSON.stringify(v.dues)!==JSON.stringify(S.dues)){S.dues=v.dues;c=true;}
      if(c)rM();
    });
  },3000);
}

function go(){
  document.getElementById("sp").style.display="none";
  if(!S.user){
    document.getElementById("ob").style.display="flex";
    document.getElementById("mn").style.display="none";
    rOB();
  } else {
    document.getElementById("ob").style.display="none";
    document.getElementById("mn").style.display="block";
    rM();
  }
  var md=document.getElementById("md");
  if(S.showTE&&S.user&&S.user.isAdmin){md.style.display="flex";rTM();}
  else md.style.display="none";
}

function rOB(){
  var el=document.getElementById("ob");el.innerHTML="";
  var adm=S.members.find(function(m){return m.id==S.team.adminId;});
  if(S.pinStep){
    var pin=S.pin||"";
    var bk=mk("button","← 뒤로");cs(bk,"background:none;border:none;color:#ffffff50;font-size:13px;margin-bottom:32px;align-self:flex-start");bk.onclick=function(){S.pinStep=false;S.pin="";rOB();};el.appendChild(bk);
    var inf=dv("","");cs(inf,"text-align:center;margin-bottom:36px");inf.innerHTML='<div style="font-size:48px;margin-bottom:12px">⚽</div><div style="font-size:18px;font-weight:900">관리자 확인</div><div style="font-size:13px;color:#ffffff50;margin-top:8px">'+(S.pendingUser?S.pendingUser.name+"님, ":"")+'PIN을 입력해주세요</div>';el.appendChild(inf);
    var dots=dv("pd","");for(var i=0;i<4;i++){dots.appendChild(dv("dt"+(pin.length>i?" on":""),""));}el.appendChild(dots);
    var pg=dv("pg","");
    ["1","2","3","4","5","6","7","8","9","","0","⌫"].forEach(function(k){
      var b=mk("button",k);b.className="pk"+(k===""?" em":"");
      if(k==="⌫")b.onclick=function(){S.pin=S.pin.slice(0,-1);rOB();};
      else if(k)b.onclick=(function(kk){return function(){if(S.pin.length<4){S.pin+=kk;rOB();}};})(k);
      pg.appendChild(b);
    });
    el.appendChild(pg);
    if(S.pinError){var pe=dv("","❌ PIN이 올바르지 않습니다");cs(pe,"text-align:center;color:#ff8080;font-size:12px;margin-bottom:12px");el.appendChild(pe);}
    var cb=mk("button","확인");cb.className="bp";cb.style.width="100%";cb.style.opacity=pin.length<4?0.4:1;cb.disabled=pin.length<4;
    cb.onclick=function(){if(S.pin==S.team.adminPin){S.user={id:S.pendingUser.id,name:S.pendingUser.name,isAdmin:true};S.pinStep=false;su();go();}else{S.pinError=true;S.pin="";rOB();}};
    el.appendChild(cb);
    var nw=dv("","");cs(nw,"text-align:center;margin-top:18px");var nb=mk("button","일반 멤버로 접속");cs(nb,"background:none;border:none;color:#ffffff35;font-size:12px;text-decoration:underline");nb.onclick=function(){S.user={id:S.pendingUser.id,name:S.pendingUser.name,isAdmin:false};S.pinStep=false;su();go();};nw.appendChild(nb);el.appendChild(nw);
    return;
  }
  var logo=dv("","");cs(logo,"text-align:center;margin-bottom:40px");logo.innerHTML='<div style="font-size:64px;margin-bottom:12px">⚽</div><div style="font-size:24px;font-weight:900">'+(S.team?S.team.name:"")+'</div><div style="font-size:13px;color:#ffffff50;margin-top:6px">멤버 '+S.members.length+'명 · 관리자 '+(adm?adm.name:"")+'</div>';el.appendChild(logo);
  el.appendChild(dv("","<div style='font-size:14px;font-weight:700;color:#ffffff70;margin-bottom:16px;text-align:center'>본인을 선택해주세요</div>"));
  var grid=dv("mg","");
  S.members.forEach(function(m){
    var isA=m.id==S.team.adminId;var btn=mk("button","");btn.className="mbt";
    btn.innerHTML='<div style="font-size:26px;margin-bottom:8px">'+(isA?"⚽":"👤")+'</div><div style="font-size:13px;font-weight:700">'+m.name+'</div>'+(isA?'<div style="font-size:10px;color:#00d4aa;margin-top:4px;font-weight:700">관리자</div>':'');
    btn.onclick=(function(mm){return function(){if(mm.id==S.team.adminId){S.pinStep=true;S.pendingUser=mm;S.pin="";S.pinError=false;rOB();}else{S.user={id:mm.id,name:mm.name,isAdmin:false};su();go();}};})(m);
    grid.appendChild(btn);
  });
  el.appendChild(grid);
  el.appendChild(dv("","<div style='margin-top:24px;font-size:11px;color:#ffffff25;text-align:center'>선택 정보는 이 기기에 저장됩니다</div>"));
}

function rM(){if(!S.user)return;rH();rT();rC();var md=document.getElementById("md");if(S.showTE&&S.user.isAdmin){md.style.display="flex";rTM();}else md.style.display="none";}
function rH(){
  var adm=S.members.find(function(m){return m.id==S.team.adminId;});var isA=S.user&&S.user.isAdmin;
  var el=document.getElementById("hd");
  el.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:10px"><div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#00d4aa,#0066ff);display:flex;align-items:center;justify-content:center;font-size:20px">⚽</div><div><div style="font-weight:900;font-size:16px">'+(S.team?S.team.name:"")+'</div><div style="font-size:10px;color:#ffffff60">멤버 '+S.members.length+'명 · 관리자 '+(adm?adm.name:"")+'<span style="margin-left:6px;color:'+(isA?"#00d4aa":"#ffffff80")+';font-weight:700">'+(isA?"⚽ 관리자":"· "+(S.user?S.user.name:""))+'</span></div></div></div><button class="bg" style="font-size:11px;padding:5px 10px" id="lb">로그아웃</button></div>';
  document.getElementById("lb").onclick=function(){S.user=null;su();S.tab="home";go();};
}
function rT(){
  var tabs=[{k:"home",l:"홈",i:"⚽"},{k:"dues",l:"회비",i:"💰"},{k:"match",l:"경기",i:"📅"},{k:"notice",l:"공지",i:"📢"},{k:"chat",l:"대화",i:"💬"}];
  if(S.user&&S.user.isAdmin)tabs.push({k:"manage",l:"관리",i:"⚙️"});
  var el=document.getElementById("tb");el.innerHTML="";
  tabs.forEach(function(tb){var btn=mk("button","");btn.innerHTML='<span class="ti">'+tb.i+'</span><span class="tl'+(S.tab==tb.k?" on":"")+'">'+tb.l+'</span>';btn.onclick=(function(k){return function(){S.tab=k;rC();rT();};})(tb.k);el.appendChild(btn);});
}
function rC(){
  var el=document.getElementById("ct");el.innerHTML="";
  if(S.tab=="home")bH(el);else if(S.tab=="dues")bD(el);else if(S.tab=="match")bMt(el);else if(S.tab=="notice")bN(el);else if(S.tab=="chat")bC(el);else if(S.tab=="manage")bMg(el);
}

function bH(w){
  var cur=nowMonth();
  var curDues=mDues(cur);
  var pc=S.members.filter(function(m){return curDues[m.id]&&curDues[m.id].paid;}).length;
  var tp=S.members.reduce(function(s,m){return s+(mAmt(cur,m.id)||0);},0);
  var nx=S.matches.filter(function(m){return !m.result;})[0];
  var g=dv("","");cs(g,"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px");
  g.innerHTML='<div style="background:linear-gradient(135deg,#00d4aa20,#00d4aa08);border:1px solid #00d4aa30;border-radius:14px;padding:14px 16px"><div style="font-size:11px;color:#00d4aa;margin-bottom:4px;font-weight:700">'+monthLabel(cur)+' 회비</div><div style="font-size:28px;font-weight:900">'+pc+'<span style="font-size:14px;font-weight:400;color:#ffffff60">/'+S.members.length+'</span></div><div style="font-size:11px;color:#ffffff40;margin-top:2px">'+tp.toLocaleString()+'원</div></div><div style="background:linear-gradient(135deg,#0066ff20,#0066ff08);border:1px solid #0066ff30;border-radius:14px;padding:14px 16px"><div style="font-size:11px;color:#4d9fff;margin-bottom:4px;font-weight:700">다음 경기</div>'+(nx?'<div style="font-size:15px;font-weight:900">'+(nx.date?nx.date.slice(5).replace("-","/"):"")+'</div><div style="font-size:11px;color:#ffffff40;margin-top:2px">'+(nx.opponent?"vs "+nx.opponent:nx.location)+'</div>':'<div style="font-size:13px;color:#ffffff40">일정 없음</div>')+'</div>';
  w.appendChild(g);
  var done=S.matches.filter(function(m){return m.result;});
