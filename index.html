<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ninetyz FC</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;background:#111;font-family:'Noto Sans KR',sans-serif;color:#fff;}
    #app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;}
    .card{background:#1a1a1a;border-radius:16px;padding:16px;margin-bottom:12px;}
    .btn-primary{background:linear-gradient(90deg,#00d4a0,#0088ff);border:none;border-radius:12px;padding:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;width:100%;font-family:inherit;}
    .btn-ghost{background:#222;border:1px solid #2a2a2a;border-radius:12px;padding:10px;color:#ccc;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;}
    .input{background:#222;border:1px solid #2a2a2a;border-radius:12px;padding:10px 14px;color:#fff;font-size:14px;outline:none;font-family:inherit;width:100%;box-sizing:border-box;}
    .tab-content{padding:16px 14px 80px;}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0d0d0d;border-top:1px solid #2a2a2a;display:flex;padding:6px 0 10px;z-index:100;}
    .nav-btn{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;font-family:inherit;}
    .nav-icon{font-size:22px;}
    .nav-label{font-size:9px;}
    .badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
    .flex{display:flex;} .gap8{gap:8px;} .gap6{gap:6px;}
    .wrap{flex-wrap:wrap;}
    input[type=date]::-webkit-calendar-picker-indicator,
    input[type=time]::-webkit-calendar-picker-indicator{filter:invert(1);}
    .subtab{display:flex;background:#1a1a1a;border-radius:14px;padding:4px;margin-bottom:18px;gap:4px;}
    .subtab-btn{flex:1;border:none;border-radius:10px;padding:9px 0;font-size:13px;cursor:pointer;font-family:inherit;font-weight:400;color:#888;background:transparent;}
    .subtab-btn.active{background:linear-gradient(90deg,#00d4a0,#0088ff);color:#fff;font-weight:700;}
    .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
    .size-btn{padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #2a2a2a;background:transparent;color:#888;font-family:inherit;}
    .size-btn.active{background:#00d4a0;border-color:#00d4a0;color:#000;}
    .month-btn{border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;border:1px solid #2a2a2a;background:#1a1a1a;color:#ccc;font-family:inherit;}
    .month-btn.active{background:#00d4a0;border-color:#00d4a0;color:#000;font-weight:700;}
    .chat-bubble{border-radius:18px;padding:10px 14px;font-size:14px;word-break:break-word;max-width:72%;}
    .header{background:linear-gradient(180deg,#1a2040 0%,#141828 100%);padding:16px;border-bottom:1px solid #2a2a2a;position:sticky;top:0;z-index:100;}
    textarea.input{resize:none;min-height:80px;}
    ::-webkit-scrollbar{width:0;}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;}
    .spinner{width:48px;height:48px;border:4px solid #2a2a2a;border-top-color:#00d4a0;border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/firebase@8.10.1/firebase-app.js"></script>
<script src="https://unpkg.com/firebase@8.10.1/firebase-database.js"></script>
<script>
// ── 상수 ──────────────────────────────────────────
const ADMIN_ID = 1, ADMIN_PW = "1886", DUE_AMT = 20000;
const SIZES = ["XS","S","M","L","XL","XXL","3XL"];
const C = {teal:"#00d4a0",blue:"#0088ff",red:"#e05555",yellow:"#e0a030",sub:"#888",dim:"#555",border:"#2a2a2a"};

function getMonths(n=5){
  const res=[],now=new Date(2026,6,1);
  for(let i=0;i<n;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);res.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);}
  return res;
}
const MONTHS=getMonths(5);
function mLabel(m){const[y,mo]=m.split("-");return `${y}년 ${+mo}월`;}

const INIT_MEMBERS=[
  {id:1,name:"김민형",status:"정상",customStatus:"",uniform:null},
  {id:2,name:"강희관",status:"정상",customStatus:"",uniform:null},
  {id:3,name:"곽종현",status:"정상",customStatus:"",uniform:null},
  {id:4,name:"김성준",status:"정상",customStatus:"",uniform:null},
  {id:5,name:"김재민",status:"정상",customStatus:"",uniform:null},
  {id:6,name:"김효태",status:"정상",customStatus:"",uniform:null},
  {id:7,name:"배성록",status:"정상",customStatus:"",uniform:null},
  {id:8,name:"오성택",status:"정상",customStatus:"",uniform:null},
  {id:9,name:"유세원",status:"정상",customStatus:"",uniform:null},
  {id:10,name:"윤준범",status:"정상",customStatus:"",uniform:null},
  {id:11,name:"이원준",status:"정상",customStatus:"",uniform:null},
  {id:12,name:"이정기",status:"정상",customStatus:"",uniform:null},
  {id:13,name:"이희승",status:"정상",customStatus:"",uniform:null},
  {id:14,name:"임종철",status:"정상",customStatus:"",uniform:null},
  {id:15,name:"류진엽",status:"정상",customStatus:"",uniform:null},
  {id:16,name:"정오성",status:"정상",customStatus:"",uniform:null},
  {id:17,name:"조성훈",status:"정상",customStatus:"",uniform:null},
  {id:18,name:"한호성",status:"정상",customStatus:"",uniform:null},
];
function initDues(members){
  const d={};MONTHS.forEach(m=>{d[m]={};members.forEach(mb=>{d[m][mb.id]={paid:false,amount:0};});});return d;
}
function toArr(v){if(!v)return[];if(Array.isArray(v))return v.filter(Boolean);return Object.values(v).filter(Boolean);}
function el(tag,props,...children){
  const e=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")e.className=v;
    else if(k==="value"&&(tag==="input"||tag==="textarea"))e.value=v;
    else if(k==="placeholder")e.placeholder=v;
    else if(k==="type")e.type=v;
    else if(k==="rows")e.rows=v;
    else e.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{if(c==null)return;e.append(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);});
  return e;
}
function div(cls,props,...ch){return el("div",{className:cls,...props},...ch);}
function span(cls,props,...ch){return el("span",{className:cls,...props},...ch);}
function btn(cls,props,...ch){return el("button",{className:cls,...props},...ch);}
function inp(props){return el("input",props);}
function txt(props){return el("textarea",props);}

// ── Firebase ────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyAO44jFDdSij4H8wLkGXBUsGYMRrThXk8g",
  authDomain:"ninetyz-fc.firebaseapp.com",
  databaseURL:"https://ninetyz-fc-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"ninetyz-fc",
  storageBucket:"ninetyz-fc.firebasestorage.app",
  messagingSenderId:"633669623460",
  appId:"1:633669623460:web:ee844f91ea29c0ffb09031"
});
const db=firebase.database();
function fbSet(path,data){db.ref(path).set(data);}
function fbOn(path,cb){db.ref(path).on("value",s=>{cb(s.val());});}

// ── 앱 상태 ─────────────────────────────────────────
let S={
  loading:true,
  members:[],dues:{},matches:[],notices:[],chat:[],activity:[],
  user:null,tab:"home",manTab:"dues",dueMonth:MONTHS[0],
  editDue:null,editAmt:"",editCustom:"",
  attendView:null,resultEdit:null,resultIn:{our:"",opp:""},
  showAddMatch:false,newMatch:{date:"",time:"",location:"",opponent:""},
  newNotice:"",chatMsg:"",addMember:false,newMemberName:"",
  pwModal:false,pwInput:"",pwErr:false,pendId:null,
};
try{const u=localStorage.getItem("nfc_user");if(u)S.user=JSON.parse(u);}catch(e){}

function setState(updates){
  Object.assign(S,updates);
  if(updates.user!==undefined){try{if(S.user)localStorage.setItem("nfc_user",JSON.stringify(S.user));else localStorage.removeItem("nfc_user");}catch(e){}}
  render();
}

function addLog(msg){
  const entry={id:Date.now(),msg,time:"방금 전"};
  fbSet("actLog",[entry,...(S.activity||[]).slice(0,19)]);
}

// Firebase 리스너
let listenersReady={members:false,dues:false,matches:false,notices:false,chat:false,activity:false};
function checkReady(){
  if(Object.values(listenersReady).every(Boolean)){setState({loading:false});}
}
fbOn("members",v=>{
  if(v){setState({members:toArr(v)});}
  else fbSet("members",INIT_MEMBERS);
  listenersReady.members=true;checkReady();
});
fbOn("dues",v=>{
  if(v){setState({dues:v});}
  else fbSet("dues",initDues(INIT_MEMBERS));
  listenersReady.dues=true;checkReady();
});
fbOn("matches",v=>{setState({matches:v?toArr(v):[]});listenersReady.matches=true;checkReady();});
fbOn("notices",v=>{setState({notices:v?toArr(v):[]});listenersReady.notices=true;checkReady();});
fbOn("chat",v=>{setState({chat:v?toArr(v):[]});listenersReady.chat=true;checkReady();});
fbOn("actLog",v=>{setState({activity:v?toArr(v):[]});listenersReady.activity=true;checkReady();});

// ── 렌더링 ──────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(S.loading){app.appendChild(renderLoading());return;}
  if(!S.user){app.appendChild(renderLogin());return;}
  app.appendChild(renderMain());
  if(S.tab==="chat")setTimeout(()=>{const e=document.getElementById("chat-end");if(e)e.scrollIntoView({behavior:"smooth"});},50);
}

function renderLoading(){
  return div("loading",{},
    el("div",{style:{width:72,height:72,borderRadius:"50%",background:`linear-gradient(135deg,${C.teal},${C.blue})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}},"⚽"),
    el("div",{style:{fontSize:20,fontWeight:900}},"Ninetyz FC"),
    el("div",{className:"spinner"})
  );
}

function renderLogin(){
  const wrap=div("",{style:{background:"#111",minHeight:"100vh",padding:24}});
  if(S.pwModal){
    const overlay=div("",{style:{position:"fixed",inset:0,background:"#000c",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}});
    const box=div("card",{style:{maxWidth:320,width:"100%",background:"#1e2235",border:"1px solid #2a2a2a"}},
      el("div",{style:{fontSize:22,textAlign:"center",marginBottom:8}},"🔐"),
      el("div",{style:{fontSize:16,fontWeight:900,textAlign:"center",marginBottom:4}},"관리자 확인"),
      el("div",{style:{fontSize:12,color:C.sub,textAlign:"center",marginBottom:20}},"비밀번호 입력"),
      inp({className:"input",type:"password",placeholder:"비밀번호",value:S.pwInput,style:{textAlign:"center",fontSize:20,letterSpacing:6,marginBottom:8},onInput:e=>setState({pwInput:e.target.value,pwErr:false}),onKeydown:e=>{if(e.key==="Enter")submitPw();}}),
      S.pwErr?el("div",{style:{fontSize:12,color:C.red,textAlign:"center",marginBottom:8}},"비밀번호가 틀렸습니다"):null,
      div("flex gap8",{style:{marginTop:4}},
        btn("btn-ghost",{style:{flex:1},onClick:()=>setState({pwModal:false,pwInput:"",pwErr:false})},"취소"),
        btn("btn-primary",{style:{flex:1},onClick:submitPw},"확인")
      )
    );
    overlay.appendChild(box);
    wrap.appendChild(overlay);
  }
  wrap.appendChild(div("",{style:{textAlign:"center",marginBottom:32,paddingTop:20}},
    div("",{style:{width:72,height:72,borderRadius:"50%",background:`linear-gradient(135deg,${C.teal},${C.blue})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 16px"}},"⚽"),
    el("div",{style:{fontSize:24,fontWeight:900}},"Ninetyz FC"),
    el("div",{style:{fontSize:13,color:C.sub,marginTop:6}},"이름을 눌러 입장하세요")
  ));
  const grid=div("",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}});
  S.members.forEach(m=>{
    const b=btn("",{style:{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:14,padding:"14px 8px",color:"#fff",cursor:"pointer",textAlign:"center",fontFamily:"inherit"},onClick:()=>selectMember(m)},
      el("div",{style:{fontSize:13,fontWeight:700}},m.name)
    );
    if(m.id===ADMIN_ID)b.appendChild(el("div",{style:{fontSize:10,color:C.teal,marginTop:3}},"🔐 관리자"));
    if(m.status&&m.status!=="정상")b.appendChild(el("div",{style:{fontSize:10,color:m.status==="부상"?C.red:C.yellow,marginTop:3}},m.status));
    grid.appendChild(b);
  });
  wrap.appendChild(grid);
  return wrap;
}

function submitPw(){
  if(S.pwInput===ADMIN_PW){
    const m=S.members.find(x=>x.id===S.pendId);
    setState({user:{id:S.pendId,name:m.name,isAdmin:true},pwModal:false,pwInput:"",pwErr:false});
  } else setState({pwErr:true});
}
function selectMember(m){
  if(m.id===ADMIN_ID)setState({pendId:m.id,pwModal:true,pwInput:"",pwErr:false});
  else setState({user:{id:m.id,name:m.name,isAdmin:false}});
}

function renderMain(){
  const isAdmin=S.user.isAdmin===true;
  const myId=S.user.id;
  const wrap=div("",{});
  // 헤더
  wrap.appendChild(div("header",{},
    div("flex",{style:{justifyContent:"space-between",alignItems:"center"}},
      div("flex",{style:{alignItems:"center",gap:12}},
        div("",{style:{width:44,height:44,borderRadius:"50%",background:`linear-gradient(135deg,${C.teal},${C.blue})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}},"⚽"),
        div("",{},
          el("div",{style:{fontWeight:900,fontSize:18}},"Ninetyz FC"),
          el("div",{style:{fontSize:11,color:C.sub}},`멤버 ${S.members.length}명 · ${isAdmin?"관리자 ⚙️ ":""}${S.user.name}`)
        )
      ),
      btn("btn-ghost",{style:{padding:"6px 14px",fontSize:12},onClick:()=>setState({user:null})},"로그아웃")
    )
  ));
  // 탭 콘텐츠
  const content=div("tab-content",{});
  if(S.tab==="home")content.appendChild(renderHome(isAdmin,myId));
  if(S.tab==="manage")content.appendChild(renderManage(isAdmin,myId));
  if(S.tab==="match")content.appendChild(renderMatch(isAdmin,myId));
  if(S.tab==="notice")content.appendChild(renderNotice(isAdmin));
  if(S.tab==="chat")content.appendChild(renderChat(myId));
  wrap.appendChild(content);
  // 하단 탭
  const tabs=[["home","⚽","홈"],["manage","📋","관리"],["match","📅","경기"],["notice","📢","공지"],["chat","💬","대화"]];
  const nav=div("bottom-nav",{});
  tabs.forEach(([key,icon,label])=>{
    nav.appendChild(btn("nav-btn",{onClick:()=>setState({tab:key})},
      el("span",{className:"nav-icon"},icon),
      el("span",{className:"nav-label",style:{color:S.tab===key?C.teal:C.dim,fontWeight:S.tab===key?700:400}},label)
    ));
  });
  wrap.appendChild(nav);
  return wrap;
}

function renderHome(isAdmin,myId){
  const thisDues=S.dues[MONTHS[0]]||{};
  const paidCount=Object.values(thisDues).filter(d=>d&&d.paid).length;
  const totalPaid=Object.values(thisDues).reduce((s,d)=>s+(d&&d.paid?d.amount:0),0);
  const uniformCount=S.members.filter(m=>m.uniform).length;
  const nextMatch=[...S.matches].filter(m=>!m.result).sort((a,b)=>a.date.localeCompare(b.date))[0];
  const wrap=div("",{});
  wrap.appendChild(div("",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}},
    div("card",{style:{background:`linear-gradient(135deg,${C.teal}22,${C.teal}08)`,border:`1px solid ${C.teal}33`,padding:"14px 12px"}},
      el("div",{style:{fontSize:11,color:C.teal,fontWeight:700,marginBottom:6}},mLabel(MONTHS[0])+" 회비"),
      el("div",{style:{fontSize:28,fontWeight:900}},paidCount,el("span",{style:{fontSize:13,color:C.sub,fontWeight:400}},`/${S.members.length}`)),
      el("div",{style:{fontSize:11,color:C.sub,marginTop:3}},totalPaid.toLocaleString()+"원")
    ),
    div("card",{style:{background:`linear-gradient(135deg,#0088ff22,#0088ff08)`,border:`1px solid #0088ff33`,padding:"14px 12px"}},
      el("div",{style:{fontSize:11,color:C.blue,fontWeight:700,marginBottom:6}},"다음 경기"),
      nextMatch?[el("div",{style:{fontSize:15,fontWeight:900}},nextMatch.date.slice(5).replace("-","/")),nextMatch.opponent?el("div",{style:{fontSize:11,color:C.sub,marginTop:3}},"vs "+nextMatch.opponent):null]:el("div",{style:{fontSize:13,color:C.sub,marginTop:6}},"일정 없음")
    ),
    div("card",{style:{background:`linear-gradient(135deg,${C.yellow}22,${C.yellow}08)`,border:`1px solid ${C.yellow}33`,padding:"14px 12px"}},
      el("div",{style:{fontSize:11,color:C.yellow,fontWeight:700,marginBottom:6}},"유니폼"),
      el("div",{style:{fontSize:28,fontWeight:900}},uniformCount,el("span",{style:{fontSize:13,color:C.sub,fontWeight:400}},`/${S.members.length}`))
    )
  ));
  const done=S.matches.filter(m=>m.result);
  if(done.length){
    const w=done.filter(m=>m.result.outcome==="win").length,d2=done.filter(m=>m.result.outcome==="draw").length,l=done.filter(m=>m.result.outcome==="lose").length;
    wrap.appendChild(div("card",{},
      el("div",{style:{fontSize:13,color:C.sub,marginBottom:10}},"시즌 전적"),
      div("flex",{style:{gap:24}},
        ...[[w,C.teal,"승"],[d2,C.yellow,"무"],[l,C.red,"패"]].map(([n,c,lb])=>div("",{},el("div",{style:{fontSize:28,fontWeight:900,color:c}},n),el("div",{style:{fontSize:12,color:C.sub}},lb)))
      )
    ));
  }
  if(S.activity.length){
    wrap.appendChild(div("card",{},
      el("div",{style:{fontSize:13,color:C.sub,marginBottom:10}},"최근 활동"),
      ...S.activity.slice(0,5).map(a=>div("flex",{style:{justifyContent:"space-between",marginBottom:8,fontSize:13}},
        el("span",{},el("span",{style:{color:C.teal,marginRight:6}},"•"),a.msg),
        el("span",{style:{color:C.dim,fontSize:11,marginLeft:8,whiteSpace:"nowrap"}},a.time)
      ))
    ));
  }
  const unpaid=S.members.filter(m=>!thisDues[m.id]?.paid);
  wrap.appendChild(div("card",{},
    el("div",{style:{fontSize:13,color:C.sub,marginBottom:10}},"이번달 미납"),
    div("flex wrap",{style:{gap:6}},
      ...unpaid.length?unpaid.map(m=>el("span",{style:{background:C.red+"22",border:`1px solid ${C.red}44`,borderRadius:20,padding:"3px 10px",fontSize:12,color:C.red}},m.name)):
      [el("span",{style:{fontSize:13,color:C.teal}},"🎉 전원 납부 완료!")]
    )
  ));
  return wrap;
}

function renderManage(isAdmin,myId){
  const wrap=div("",{});
  wrap.appendChild(div("subtab",{},
    ...["dues","uniform","team"].map((k,i)=>{
      const labels=["💰 회비","👕 유니폼","⚙️ 팀"];
      return btn("subtab-btn"+(S.manTab===k?" active":""),{onClick:()=>setState({manTab:k})},labels[i]);
    })
  ));
  if(S.manTab==="dues")wrap.appendChild(renderDues(isAdmin,myId));
  if(S.manTab==="uniform")wrap.appendChild(renderUniform(isAdmin,myId));
  if(S.manTab==="team")wrap.appendChild(renderTeam(isAdmin,myId));
  return wrap;
}

function renderDues(isAdmin,myId){
  const wrap=div("",{});
  wrap.appendChild(div("flex wrap",{style:{gap:8,marginBottom:14}},
    ...MONTHS.map(m=>btn("month-btn"+(S.dueMonth===m?" active":""),{onClick:()=>setState({dueMonth:m})},mLabel(m)))
  ));
  const md=S.dues[S.dueMonth]||{};
  const pc=Object.values(md).filter(d=>d&&d.paid).length;
  const tp=Object.values(md).reduce((s,d)=>s+(d&&d.paid?d.amount:0),0);
  wrap.appendChild(div("card",{},
    div("flex",{style:{justifyContent:"space-between",marginBottom:8}},
      el("span",{style:{fontSize:13,color:C.sub}},mLabel(S.dueMonth)+" 납부 현황"),
      el("span",{style:{fontSize:13,fontWeight:700,color:C.teal}},`${pc}/${S.members.length}명`)
    ),
    div("",{style:{background:"#333",borderRadius:99,height:6,overflow:"hidden",marginBottom:8}},
      div("",{style:{width:`${S.members.length?pc/S.members.length*100:0}%`,height:"100%",background:`linear-gradient(90deg,${C.teal},${C.blue})`,borderRadius:99}})
    ),

    row.appendChild(inner);msgArea.appendChild(row);
  });
  msgArea.appendChild(el("div",{id:"chat-end"}));
  wrap.appendChild(msgArea);
  const msgIn=inp({className:"input",placeholder:"메시지 입력...",value:S.chatMsg,style:{flex:1},onInput:e=>setState({chatMsg:e.target.value}),onKeydown:e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat(myId);}}});
  wrap.appendChild(div("flex gap8",{style:{paddingBottom:4}},msgIn,btn("btn-primary",{style:{width:"auto",padding:"10px 20px",borderRadius:12},onClick:()=>sendChat(myId)},"전송")));
  return wrap;
}
function sendChat(myId){
  if(!S.chatMsg.trim())return;
  const now=new Date();const t=`오${now.getHours()<12?"전":"후"} ${String(now.getHours()%12||12).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
  fbSet("chat",[...S.chat,{id:Date.now(),senderId:myId,senderName:S.user.name,content:S.chatMsg,time:t}]);
  setState({chatMsg:""});
}

// 초기 렌더
render();
</script>
</body>
</html>
