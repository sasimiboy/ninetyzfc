<script type="text/babel">
const {useState,useEffect,useRef} = React;
const db = window._db;

const ADMIN_ID=1,ADMIN_PW="1886",DUE_AMT=20000;
const SIZES=["XS","S","M","L","XL","XXL","3XL"];
const C={bg:"#111",card:"#1a1a1a",card2:"#222",teal:"#00d4a0",blue:"#0088ff",red:"#e05555",yellow:"#e0a030",border:"#2a2a2a",sub:"#888",dim:"#555"};

function getMonths(n=5){
  const res=[],now=new Date(2026,6,1);
  for(let i=0;i<n;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);res.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);}
  return res;
}
const MONTHS=getMonths(2);
function mLabel(m){const[y,mo]=m.split("-");return `${y}년 ${+mo}월`;}

const INIT_MEMBERS=[
  {id:1,name:"김민형",status:"정상",customStatus:"",uniform:null},
  {id:2,name:"강희관",status:"정상",customStatus:"",uniform:null},
  {id:3,name:"곽종현",status:"정상",customStatus:"",uniform:null},
  {id:4,name:"김성준",status:"정상",customStatus:"",uniform:null},
  {id:5,name:"김재민",status:"정상",customStatus:"",uniform:null},
  {id:6,name:"김효태",status:"정상",customStatus:"",uniform:null},
  {id:7,name:"배성록",status:"정상",customStatus:"",uniform:null},
  {id:8,name:"오성택",status:"정상",customStatus:"",uniform:null},
  {id:9,name:"유세원",status:"정상",customStatus:"",uniform:null},
  {id:10,name:"윤준범",status:"정상",customStatus:"",uniform:null},
  {id:11,name:"이원준",status:"정상",customStatus:"",uniform:null},
  {id:12,name:"이정기",status:"정상",customStatus:"",uniform:null},
  {id:13,name:"이희승",status:"정상",customStatus:"",uniform:null},
  {id:14,name:"임종철",status:"정상",customStatus:"",uniform:null},
  {id:15,name:"류진엽",status:"정상",customStatus:"",uniform:null},
  {id:16,name:"정오성",status:"정상",customStatus:"",uniform:null},
  {id:17,name:"조성훈",status:"정상",customStatus:"",uniform:null},
  {id:18,name:"한호성",status:"정상",customStatus:"",uniform:null},
];
function initDues(members){
  const d={};MONTHS.forEach(m=>{d[m]={};members.forEach(mb=>{d[m][mb.id]={paid:false,amount:0};});});return d;
}
function toArr(v){if(!v)return[];if(Array.isArray(v))return v.filter(Boolean);return Object.values(v).filter(Boolean);}
function load(key){try{const s=localStorage.getItem(key);return s?JSON.parse(s):null;}catch(e){return null;}}

function StatusBadge({status}){
  const col=status==="정상"?C.teal:status==="부상"?C.red:C.yellow;
  return <span style={{padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:700,background:col+"22",color:col,border:`1px solid ${col}44`}}>{status}</span>;
}

function App(){
  const [loading,setLoading]=useState(true);
  const [members,setMembers]=useState([]);
  const [dues,setDues]=useState({});
  const [matches,setMatches]=useState([]);
  const [notices,setNotices]=useState([]);
  const [activity,setActivity]=useState([]);
  const [user,setUser]=useState(load("nfc_user")||null);
  const [pwModal,setPwModal]=useState(false);
  const [pwInput,setPwInput]=useState("");
  const [pwErr,setPwErr]=useState(false);
  const [pendId,setPendId]=useState(null);
  const [tab,setTab]=useState("home");
  const [manTab,setManTab]=useState("dues");
  const [dueMonth,setDueMonth]=useState(MONTHS[0]);
  const [editDue,setEditDue]=useState(null);
  const [editAmt,setEditAmt]=useState("");
  const [editCustom,setEditCustom]=useState("");
  const [attendView,setAttendView]=useState(null);
  const [resultEdit,setResultEdit]=useState(null);
  const [resultIn,setResultIn]=useState({our:"",opp:""});
  const [showAddMatch,setShowAddMatch]=useState(false);
  const [newMatch,setNewMatch]=useState({date:"",time:"",location:"",opponent:""});
  const [newNotice,setNewNotice]=useState("");
  const [addMember,setAddMember]=useState(false);
  const [newMemberName,setNewMemberName]=useState("");
  const actRef=useRef([]);

  const isAdmin=user?.isAdmin===true;
  const myId=user?.id;

  useEffect(()=>{
    let done={members:false,dues:false,matches:false,notices:false,chat:false,actLog:false};
    function chk(){if(Object.values(done).every(Boolean))setLoading(false);}
    db.ref("members").on("value",s=>{const v=s.val();if(v)setMembers(toArr(v));else db.ref("members").set(INIT_MEMBERS);done.members=true;chk();});
    db.ref("dues").on("value",s=>{const v=s.val();if(v)setDues(v);else db.ref("dues").set(initDues(INIT_MEMBERS));done.dues=true;chk();});
    db.ref("matches").on("value",s=>{setMatches(s.val()?toArr(s.val()):[]);done.matches=true;chk();});
    db.ref("notices").on("value",s=>{setNotices(s.val()?toArr(s.val()):[]);done.notices=true;chk();});
    db.ref("actLog").on("value",s=>{const a=s.val()?toArr(s.val()):[];setActivity(a);actRef.current=a;done.actLog=true;chk();});
    return()=>["members","dues","matches","notices","actLog"].forEach(k=>db.ref(k).off());
  },[]);

  useEffect(()=>{try{if(user)localStorage.setItem("nfc_user",JSON.stringify(user));else localStorage.removeItem("nfc_user");}catch(e){}},[user]);

  function addLog(msg){db.ref("actLog").set([{id:Date.now(),msg,time:"방금 전"},...actRef.current.slice(0,19)]);}
  function selectMember(m){if(m.id===ADMIN_ID){setPendId(m.id);setPwModal(true);setPwInput("");setPwErr(false);}else setUser({id:m.id,name:m.name,isAdmin:false});}
  function submitPw(){if(pwInput===ADMIN_PW){const m=members.find(x=>x.id===pendId);setUser({id:pendId,name:m.name,isAdmin:true});setPwModal(false);setPwInput("");setPwErr(false);}else setPwErr(true);}

  const iS={background:C.card2,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:14,outline:"none",fontFamily:"inherit",width:"100%",boxSizing:"border-box"};
  const btnT={background:`linear-gradient(90deg,${C.teal},${C.blue})`,border:"none",borderRadius:12,padding:"12px",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",width:"100%"};
  const btnG={background:C.card2,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px",color:"#ccc",fontWeight:600,fontSize:13,cursor:"pointer",flex:1};

  const thisMonth=MONTHS[0];
  const thisDues=dues[thisMonth]||{};
  const paidCount=Object.values(thisDues).filter(d=>d?.paid).length;
  const totalPaid=Object.values(thisDues).reduce((s,d)=>s+(d?.paid?d.amount:0),0);
  const uniformCount=members.filter(m=>m.uniform).length;
  const nextMatch=[...matches].filter(m=>!m.result).sort((a,b)=>a.date.localeCompare(b.date))[0];
  const RC={win:C.teal,lose:C.red,draw:C.yellow},RL={win:"승",lose:"패",draw:"무"};

  if(loading)return(
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{width:72,height:72,borderRadius:"50%",background:`linear-gradient(135deg,${C.teal},${C.blue})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}}>⚽</div>
      <div style={{fontSize:20,fontWeight:900}}>Ninetyz FC</div>
      <div style={{fontSize:13,color:C.sub}}>불러오는 중...</div>
    </div>
  );

  if(!user)return(
    <div style={{background:C.bg,minHeight:"100vh",padding:24,maxWidth:480,margin:"0 auto"}}>
      {pwModal&&(
        <div style={{position:"fixed",inset:0,background:"#000c",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#1e2235",borderRadius:20,padding:28,width:"100%",maxWidth:320,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:22,textAlign:"center",marginBottom:8}}>🔐</div>
            <div style={{fontSize:16,fontWeight:900,textAlign:"center",marginBottom:4}}>관리자 확인</div>
            <div style={{fontSize:12,color:C.sub,textAlign:"center",marginBottom:20}}>비밀번호 입력</div>
            <input type="password" value={pwInput} onChange={e=>{setPwInput(e.target.value);setPwErr(false);}} onKeyDown={e=>e.key==="Enter"&&submitPw()} autoFocus style={{...iS,textAlign:"center",fontSize:20,letterSpacing:6,marginBottom:8}}/>
            {pwErr&&<div style={{fontSize:12,color:C.red,textAlign:"center",marginBottom:8}}>비밀번호가 틀렸습니다</div>}
            <div style={{display:"flex",gap:8,marginTop:4}}>
              <button onClick={()=>{setPwModal(false);setPwInput("");setPwErr(false);}} style={{...btnG}}>취소</button>
              <button onClick={submitPw} style={{...btnT,flex:1,padding:"10px"}}>확인</button>
            </div>
          </div>
        </div>
      )}
      <div style={{textAlign:"center",marginBottom:32,paddingTop:20}}>
        <div style={{width:72,height:72,borderRadius:"50%",background:`linear-gradient(135deg,${C.teal},${C.blue})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 16px"}}>⚽</div>
        <div style={{fontSize:24,fontWeight:900}}>Ninetyz FC</div>
        <div style={{fontSize:13,color:C.sub,marginTop:6}}>이름을 눌러 입장하세요</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        {members.map(m=>(
          <button key={m.id} onClick={()=>selectMember(m)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 8px",color:"#fff",cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700}}>{m.name}</div>
            {m.id===ADMIN_ID&&<div style={{fontSize:10,color:C.teal,marginTop:3}}>🔐 관리자</div>}
            {m.status&&m.status!=="정상"&&<div style={{fontSize:10,color:m.status==="부상"?C.red:C.yellow,marginTop:3}}>{m.status}</div>}
          </button>
        ))}
      </div>
    </div>
  );

  return(
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",color:"#fff",position:"relative"}}>
      <div style={{background:"linear-gradient(180deg,#1a2040,#141828)",padding:"16px",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:44,height:44,borderRadius:"50%",background:`linear-gradient(135deg,${C.teal},${C.blue})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>⚽</div>
            <div>
              <div style={{fontWeight:900,fontSize:18}}>Ninetyz FC</div>
              <div style={{fontSize:11,color:C.sub}}>멤버 {members.length}명 · {isAdmin?"관리자 ⚙️ ":""}{user.name}</div>
            </div>
          </div>
          <button onClick={()=>setUser(null)} style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:20,padding:"6px 14px",color:"#ccc",fontSize:12,fontWeight:600,cursor:"pointer"}}>로그아웃</button>
        </div>
      </div>

      <div style={{padding:"16px 14px 80px"}}>

        {tab==="home"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
              <div style={{background:`linear-gradient(135deg,${C.teal}22,${C.teal}08)`,border:`1px solid ${C.teal}33`,borderRadius:16,padding:"14px 12px"}}>
                <div style={{fontSize:11,color:C.teal,fontWeight:700,marginBottom:6}}>{mLabel(thisMonth)} 회비</div>
                <div style={{fontSize:28,fontWeight:900}}>{paidCount}<span style={{fontSize:13,color:C.sub,fontWeight:400}}>/{members.length}</span></div>
                <div style={{fontSize:11,color:C.sub,marginTop:3}}>{totalPaid.toLocaleString()}원</div>
              </div>
              <div style={{background:`linear-gradient(135deg,${C.blue}22,${C.blue}08)`,border:`1px solid ${C.blue}33`,borderRadius:16,padding:"14px 12px"}}>
                <div style={{fontSize:11,color:C.blue,fontWeight:700,marginBottom:6}}>다음 경기</div>
                {nextMatch?(<><div style={{fontSize:15,fontWeight:900}}>{nextMatch.date.slice(5).replace("-","/")}</div>{nextMatch.opponent&&<div style={{fontSize:11,color:C.sub,marginTop:3}}>vs {nextMatch.opponent}</div>}</>):<div style={{fontSize:13,color:C.sub,marginTop:6}}>일정 없음</div>}
              </div>
              <div style={{background:`linear-gradient(135deg,${C.yellow}22,${C.yellow}08)`,border:`1px solid ${C.yellow}33`,borderRadius:16,padding:"14px 12px"}}>
                <div style={{fontSize:11,color:C.yellow,fontWeight:700,marginBottom:6}}>유니폼</div>
                <div style={{fontSize:28,fontWeight:900}}>{uniformCount}<span style={{fontSize:13,color:C.sub,fontWeight:400}}>/{members.length}</span></div>
              </div>
            </div>
            {(()=>{const done=matches.filter(m=>m.result);if(!done.length)return null;const w=done.filter(m=>m.result.outcome==="win").length,d=done.filter(m=>m.result.outcome==="draw").length,l=done.filter(m=>m.result.outcome==="lose").length;return(<div style={{background:C.card,borderRadius:16,padding:"14px 16px",marginBottom:12}}><div style={{fontSize:13,color:C.sub,marginBottom:10}}>시즌 전적</div><div style={{display:"flex",gap:24}}>{[[w,C.teal,"승"],[d,C.yellow,"무"],[l,C.red,"패"]].map(([n,c,lb])=>(<div key={lb}><div style={{fontSize:28,fontWeight:900,color:c}}>{n}</div><div style={{fontSize:12,color:C.sub}}>{lb}</div></div>))}</div></div>);})()}
            {activity.length>0&&(<div style={{background:C.card,borderRadius:16,padding:"14px 16px",marginBottom:12}}><div style={{fontSize:13,color:C.sub,marginBottom:10}}>최근 활동</div>{activity.slice(0,5).map(a=>(<div key={a.id} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}><span><span style={{color:C.teal,marginRight:6}}>•</span>{a.msg}</span><span style={{color:C.dim,fontSize:11,marginLeft:8,whiteSpace:"nowrap"}}>{a.time}</span></div>))}</div>)}
            <div style={{background:C.card,borderRadius:16,padding:"14px 16px"}}>
              <div style={{fontSize:13,color:C.sub,marginBottom:10}}>이번달 미납</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {members.filter(m=>!thisDues[m.id]?.paid).map(m=>(<span key={m.id} style={{background:C.red+"22",border:`1px solid ${C.red}44`,borderRadius:20,padding:"3px 10px",fontSize:12,color:C.red}}>{m.name}</span>))}
                {members.length>0&&members.every(m=>thisDues[m.id]?.paid)&&<span style={{fontSize:13,color:C.teal}}>🎉 전원 납부 완료!</span>}
              </div>
            </div>
          </div>
        )}

        {tab==="manage"&&(
          <div>
            <div style={{display:"flex",background:C.card,borderRadius:14,padding:4,marginBottom:18,gap:4}}>
              {[["dues","💰 회비"],["uniform","👕 유니폼"],["team","⚙️ 팀"]].map(([key,label])=>(
                <button key={key} onClick={()=>setManTab(key)} style={{flex:1,background:manTab===key?`linear-gradient(90deg,${C.teal},${C.blue})`:"transparent",border:"none",borderRadius:10,padding:"9px 0",color:manTab===key?"#fff":C.sub,fontWeight:manTab===key?700:400,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{label}</button>
              ))}
            </div>

            {manTab==="dues"&&(
              <div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
                  {MONTHS.map(m=>(<button key={m} onClick={()=>setDueMonth(m)} style={{background:dueMonth===m?C.teal:C.card,border:`1px solid ${dueMonth===m?C.teal:C.border}`,borderRadius:20,padding:"6px 14px",color:dueMonth===m?"#000":"#ccc",fontWeight:dueMonth===m?700:400,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{mLabel(m)}</button>))}
                </div>
                {(()=>{const md=dues[dueMonth]||{};const pc=Object.values(md).filter(d=>d?.paid).length;const tp=Object.values(md).reduce((s,d)=>s+(d?.paid?d.amount:0),0);return(<div style={{background:C.card,borderRadius:16,padding:"16px",marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,color:C.sub}}>{mLabel(dueMonth)} 납부 현황</span><span style={{fontSize:13,fontWeight:700,color:C.teal}}>{pc}/{members.length}명</span></div><div style={{background:"#333",borderRadius:99,height:6,overflow:"hidden",marginBottom:8}}><div style={{width:`${members.length?pc/members.length*100:0}%`,height:"100%",background:`linear-gradient(90deg,${C.teal},${C.blue})`,borderRadius:99}}/></div><div style={{fontSize:12,color:C.sub}}>수령 {tp.toLocaleString()}원</div></div>);})()}
                <div style={{background:C.card,borderRadius:16,padding:"16px"}}>
                  <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>멤버별 현황</div>
                  {members.map(m=>{
                    const mdue=(dues[dueMonth]||{})[m.id]||{paid:false,amount:0};
                    const isMe=m.id===myId,isEditing=editDue===m.id&&isAdmin;
                    const dots=MONTHS.map(mo=>(dues[mo]||{})[m.id]?.paid||false);
                    return(
                      <div key={m.id} style={{borderBottom:`1px solid ${C.border}`,paddingBottom:12,marginBottom:12}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:14,fontWeight:700}}>{m.name}</span>
                            {m.id===ADMIN_ID&&<span style={{background:C.teal+"33",color:C.teal,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:10}}>관리자</span>}
                            {isMe&&<span style={{background:C.blue+"33",color:C.blue,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:10}}>나</span>}
                          </div>
                          <div style={{display:"flex",gap:6,alignItems:"center"}}>
                            <span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:mdue.paid?C.teal+"22":C.red+"22",color:mdue.paid?C.teal:C.red,border:`1px solid ${mdue.paid?C.teal+"44":C.red+"44"}`}}>{mdue.paid?"납부":"미납"}</span>
                            {isAdmin&&<button onClick={()=>{if(isEditing)setEditDue(null);else{setEditDue(m.id);setEditAmt(mdue.amount||"");setEditCustom(m.customStatus||"");}}} style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,padding:"3px 10px",color:"#ccc",fontSize:11,cursor:"pointer"}}>{isEditing?"닫기":"수정"}</button>}
                          </div>
                        </div>
                        <div style={{display:"flex",gap:5,marginBottom:4}}>{dots.map((p,i)=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:p?C.teal:C.red,opacity:p?1:0.4}}/>)}</div>
                        {m.status&&m.status!=="정상"&&<div style={{marginBottom:4}}><StatusBadge status={m.status}/></div>}
                        {m.customStatus&&<div style={{fontSize:12,color:C.sub,marginTop:4}}>{m.customStatus}</div>}
                        {isEditing&&(
                          <div style={{background:C.card2,borderRadius:12,padding:12,marginTop:10}}>
                            <div style={{display:"flex",gap:8,marginBottom:10}}>
                              <button onClick={()=>{const nd={...dues};if(!nd[dueMonth])nd[dueMonth]={};nd[dueMonth]={...nd[dueMonth],[m.id]:{paid:true,amount:DUE_AMT}};db.ref("dues").set(nd);addLog(`${m.name} ${mLabel(dueMonth)} 납부 처리`);setEditDue(null);}} style={{...btnT,flex:1,padding:"10px",background:`linear-gradient(90deg,${C.teal},${C.blue})`}}>✅ 납부</button>
                              <button onClick={()=>{const nd={...dues};if(!nd[dueMonth])nd[dueMonth]={};nd[dueMonth]={...nd[dueMonth],[m.id]:{paid:false,amount:0}};db.ref("dues").set(nd);addLog(`${m.name} ${mLabel(dueMonth)} 미납 처리`);setEditDue(null);}} style={{...btnT,flex:1,padding:"10px",background:`linear-gradient(90deg,${C.red},#ff7070)`}}>❌ 미납</button>
                            </div>
                            <div style={{fontSize:12,color:C.sub,marginBottom:8}}>상태</div>
                            <div style={{display:"flex",gap:8,marginBottom:10}}>
                              {["정상","부상","휴식"].map(s=>{const col=s==="정상"?C.teal:s==="부상"?C.red:C.yellow;return(<button key={s} onClick={()=>{db.ref("members").set(members.map(p=>p.id===m.id?{...p,status:s}:p));addLog(`${m.name} 상태 → ${s}`);}} style={{flex:1,background:m.status===s?col+"33":C.card,border:`1px solid ${m.status===s?col+"66":C.border}`,borderRadius:10,padding:"7px",color:m.status===s?col:"#ccc",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{s}</button>);})}
                            </div>
                            <div style={{display:"flex",gap:8}}>
                              <input value={editCustom} onChange={e=>setEditCustom(e.target.value)} placeholder="직접입력" style={{...iS,flex:1}}/>
                              <button onClick={()=>db.ref("members").set(members.map(p=>p.id===m.id?{...p,customStatus:editCustom}:p))} style={{...btnT,width:"auto",padding:"10px 14px"}}>적용</button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {manTab==="uniform"&&(
              <div>
                <div style={{background:C.card,borderRadius:16,padding:"16px",marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,color:C.sub}}>상의 사이즈 수집 현황</span><span style={{fontSize:13,fontWeight:700,color:C.yellow}}>{uniformCount}/{members.length}명</span></div>
                  <div style={{background:"#333",borderRadius:99,height:6,overflow:"hidden",marginBottom:8}}><div style={{width:`${members.length?uniformCount/members.length*100:0}%`,height:"100%",background:`linear-gradient(90deg,${C.yellow},${C.teal})`,borderRadius:99}}/></div>
                  <div style={{fontSize:12,color:C.sub}}>미등록 {members.length-uniformCount}명 남음</div>
                </div>
                {members.filter(m=>!m.uniform).length>0&&<div style={{background:C.card,borderRadius:16,padding:"14px 16px",marginBottom:14}}><div style={{fontSize:12,color:C.yellow,fontWeight:700,marginBottom:10}}>미등록</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{members.filter(m=>!m.uniform).map(m=>(<span key={m.id} style={{background:C.yellow+"22",border:`1px solid ${C.yellow}44`,borderRadius:20,padding:"3px 10px",fontSize:12,color:C.yellow}}>{m.name}</span>))}</div></div>}
                <div style={{background:C.card,borderRadius:16,padding:"16px",marginBottom:14}}>
                  <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>멤버별 사이즈</div>
                  {members.map(m=>{
                    const isMe=m.id===myId,canEdit=isAdmin||isMe;
                    return(
                      <div key={m.id} style={{borderBottom:`1px solid ${C.border}`,paddingBottom:12,marginBottom:12}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:canEdit?8:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:14,fontWeight:700}}>{m.name}</span>
                            {isMe&&<span style={{background:C.blue+"33",color:C.blue,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:10}}>나</span>}
                          </div>
                          {m.uniform?<span style={{background:C.teal+"22",border:`1px solid ${C.teal}44`,borderRadius:20,padding:"4px 14px",fontSize:14,fontWeight:900,color:C.teal}}>{m.uniform}</span>:<span style={{fontSize:12,color:C.dim}}>미등록</span>}
                        </div>
                        {canEdit&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>{SIZES.map(s=><button key={s} onClick={()=>{db.ref("members").set(members.map(p=>p.id===m.id?{...p,uniform:s}:p));addLog(`${m.name} 유니폼: ${s}`);}} style={{padding:"5px 14px",borderRadius:20,fontSize:13,fontWeight:700,cursor:"pointer",border:`1px solid ${m.uniform===s?C.teal:C.border}`,background:m.uniform===s?C.teal:"transparent",color:m.uniform===s?"#000":C.sub,fontFamily:"inherit"}}>{s}</button>)}</div>}
                      </div>
                    );
                  })}
                </div>
                {uniformCount>0&&(()=>{const cnt={};members.filter(m=>m.uniform).forEach(m=>{cnt[m.uniform]=(cnt[m.uniform]||0)+1;});return(<div style={{background:C.card,borderRadius:16,padding:"16px"}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>📊 사이즈 집계</div>{SIZES.filter(s=>cnt[s]).map(s=>(<div key={s} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:14,fontWeight:700}}>{s}</span><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{background:C.teal,borderRadius:99,height:6,width:cnt[s]*16}}/><span style={{fontSize:14,fontWeight:700,color:C.teal,minWidth:30,textAlign:"right"}}>{cnt[s]}명</span></div></div>))}</div>);})()}
              </div>
            )}

            {manTab==="team"&&(
              <div>
                {!isAdmin?(<div style={{background:C.card,borderRadius:16,padding:"30px 20px",textAlign:"center"}}><div style={{fontSize:32,marginBottom:12}}>🔒</div><div style={{fontSize:14,fontWeight:700,marginBottom:6}}>관리자 전용</div><div style={{fontSize:12,color:C.sub}}>팀 관리는 관리자만 접근 가능합니다</div></div>):(
                  <>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <span style={{fontSize:13,color:C.sub}}>멤버 목록</span>
                      <button onClick={()=>setAddMember(!addMember)} style={{...btnT,width:"auto",padding:"7px 16px",fontSize:12,borderRadius:20}}>+ 멤버 추가</button>
                    </div>
                    {addMember&&<div style={{background:C.card,borderRadius:16,padding:14,marginBottom:12,border:`1px solid ${C.teal}44`}}><div style={{display:"flex",gap:8}}><input value={newMemberName} onChange={e=>setNewMemberName(e.target.value)} placeholder="이름 입력" style={{...iS,flex:1}}/><button onClick={()=>{if(!newMemberName.trim())return;const nm={id:Date.now(),name:newMemberName,status:"정상",customStatus:"",uniform:null};db.ref("members").set([...members,nm]);const nd={...dues};MONTHS.forEach(m=>{if(!nd[m])nd[m]={};nd[m][nm.id]={paid:false,amount:0};});db.ref("dues").set(nd);addLog(`멤버 추가: ${newMemberName}`);setNewMemberName("");setAddMember(false);}} style={{...btnT,width:"auto",padding:"10px 14px"}}>추가</button><button onClick={()=>setAddMember(false)} style={{...btnG,width:"auto",padding:"10px 12px"}}>취소</button></div></div>}
                    <div style={{background:C.card,borderRadius:16,padding:"4px 0"}}>
                      {members.map(m=>(<div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",borderBottom:`1px solid ${C.border}`}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:15,fontWeight:600}}>{m.name}</span>
                          {m.id===ADMIN_ID&&<span style={{background:C.teal+"33",color:C.teal,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:10}}>관리자</span>}
                          {m.id===myId&&<span style={{background:C.blue+"33",color:C.blue,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:10}}>나</span>}
                          {m.status&&m.status!=="정상"&&<StatusBadge status={m.status}/>}
                        </div>
                        {m.id!==ADMIN_ID&&<button onClick={()=>{if(confirm(`${m.name}님을 삭제할까요?`)){db.ref("members").set(members.filter(x=>x.id!==m.id));addLog(`멤버 삭제: ${m.name}`);}}} style={{background:C.red+"22",border:`1px solid ${C.red}44`,borderRadius:10,padding:"4px 12px",color:C.red,fontSize:12,fontWeight:700,cursor:"pointer"}}>삭제</button>}
                      </div>))}
                    </div>
                  </>
                )}
              </div>
            )}
          </div>
        )}

        {tab==="match"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontSize:18,fontWeight:900}}>📅 경기 일정</div>
              {isAdmin&&<button onClick={()=>setShowAddMatch(!showAddMatch)} style={{...btnT,width:"auto",padding:"8px 16px",fontSize:13,borderRadius:20}}>+ 일정 추가</button>}
            </div>
            {isAdmin&&showAddMatch&&(
              <div style={{background:C.card,borderRadius:16,padding:16,marginBottom:14,border:`1px solid ${C.teal}44`}}>
                <div style={{fontSize:13,fontWeight:700,color:C.teal,marginBottom:12}}>새 경기 추가</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <input type="date" value={newMatch.date} onChange={e=>setNewMatch({...newMatch,date:e.target.value})} style={iS}/>
                  <input type="time" value={newMatch.time} onChange={e=>setNewMatch({...newMatch,time:e.target.value})} style={iS}/>
                </div>
                <input placeholder="경기 장소 *" value={newMatch.location} onChange={e=>setNewMatch({...newMatch,location:e.target.value})} style={{...iS,marginBottom:8}}/>
                <input placeholder="상대팀 이름 (선택)" value={newMatch.opponent} onChange={e=>setNewMatch({...newMatch,opponent:e.target.value})} style={{...iS,marginBottom:10}}/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{if(!newMatch.date||!newMatch.time||!newMatch.location)return;const m={id:Date.now(),...newMatch,attendance:{},result:null};const upd=[...matches,m].sort((a,b)=>a.date.localeCompare(b.date));db.ref("matches").set(upd);addLog(`경기 추가: ${m.date.slice(5).replace("-","/")} ${m.opponent?"vs "+m.opponent:""}`);setNewMatch({date:"",time:"",location:"",opponent:""});setShowAddMatch(false);}} style={{...btnT,flex:1,padding:"10px"}}>추가하기</button>
                  <button onClick={()=>setShowAddMatch(false)} style={{...btnG}}>취소</button>
                </div>
              </div>
            )}
            {matches.length===0&&<div style={{textAlign:"center",color:C.dim,fontSize:13,padding:"40px 0"}}>등록된 경기 일정이 없습니다</div>}
            {[...matches].sort((a,b)=>a.date.localeCompare(b.date)).map(match=>{
              const going=members.filter(m=>match.attendance?.[m.id]==="yes");
              const pending=members.filter(m=>!match.attendance?.[m.id]);
              const myVote=match.attendance?.[myId];
              return(
                <div key={match.id} style={{background:C.card,borderRadius:16,padding:16,marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:17,fontWeight:900}}>{match.date.slice(5).replace("-","/")} {match.time}</span>
                        {match.result&&<span style={{padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:900,background:RC[match.result.outcome]+"22",color:RC[match.result.outcome],border:`1px solid ${RC[match.result.outcome]}44`}}>{RL[match.result.outcome]}</span>}
                      </div>
                      <div style={{fontSize:12,color:C.sub,marginTop:4}}>📍 {match.location}{match.opponent&&<span style={{color:C.blue,marginLeft:8}}>vs {match.opponent}</span>}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      {match.result?<div style={{fontSize:24,fontWeight:900,color:RC[match.result.outcome]}}>{match.result.our} - {match.result.opp}</div>:<><div style={{fontSize:13,color:C.teal,fontWeight:700}}>참가 {going.length}명</div><div style={{fontSize:11,color:C.dim}}>미응답 {pending.length}명</div></>}
                    </div>
                  </div>
                  {!match.result&&<div style={{display:"flex",gap:8,marginBottom:10}}>{["yes","no"].map(v=><button key={v} onClick={()=>db.ref("matches").set(matches.map(m=>m.id===match.id?{...m,attendance:{...(m.attendance||{}),[myId]:v}}:m))} style={{flex:1,padding:"8px",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer",border:`1px solid ${v==="yes"?C.teal+"44":C.red+"44"}`,background:myVote===v?(v==="yes"?C.teal:C.red):"transparent",color:myVote===v?"#000":(v==="yes"?C.teal:C.red),fontFamily:"inherit"}}>{v==="yes"?"✅ 참가":"❌ 불참"}</button>)}</div>}
                  {isAdmin&&resultEdit===match.id&&(
                    <div style={{background:C.card2,borderRadius:12,padding:12,marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                        <div style={{flex:1,textAlign:"center"}}><div style={{fontSize:11,color:C.sub,marginBottom:6}}>우리팀</div><input type="number" min="0" value={resultIn.our} onChange={e=>setResultIn({...resultIn,our:e.target.value})} style={{...iS,textAlign:"center",fontSize:24,fontWeight:900,padding:"8px"}}/></div>
                        <span style={{fontSize:20,color:C.dim,fontWeight:900,paddingTop:20}}>:</span>
                        <div style={{flex:1,textAlign:"center"}}><div style={{fontSize:11,color:C.sub,marginBottom:6}}>{match.opponent||"상대팀"}</div><input type="number" min="0" value={resultIn.opp} onChange={e=>setResultIn({...resultIn,opp:e.target.value})} style={{...iS,textAlign:"center",fontSize:24,fontWeight:900,padding:"8px"}}/></div>
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>{const our=parseInt(resultIn.our),opp=parseInt(resultIn.opp);if(isNaN(our)||isNaN(opp))return;const outcome=our>opp?"win":our<opp?"lose":"draw";db.ref("matches").set(matches.map(m=>m.id===match.id?{...m,result:{our,opp,outcome}}:m));addLog(`vs ${match.opponent||"상대팀"} ${our}-${opp} ${RL[outcome]}`);setResultEdit(null);setResultIn({our:"",opp:""}); }} style={{...btnT,flex:1,padding:"9px"}}>저장</button>
                        <button onClick={()=>setResultEdit(null)} style={{...btnG}}>취소</button>
                      </div>
                    </div>
                  )}
                  <div style={{maxHeight:attendView===match.id?600:0,overflow:"hidden",transition:"max-height 0.3s"}}>
                    <div style={{paddingTop:8}}>{members.map(m=><div key={m.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`,fontSize:13}}><span>{m.name}</span><span style={{color:match.attendance?.[m.id]==="yes"?C.teal:match.attendance?.[m.id]==="no"?C.red:C.dim,fontWeight:700}}>{match.attendance?.[m.id]==="yes"?"참가":match.attendance?.[m.id]==="no"?"불참":"미응답"}</span></div>)}</div>
                  </div>
                  <div style={{display:"flex",gap:8,marginTop:10}}>
                    <button onClick={()=>setAttendView(attendView===match.id?null:match.id)} style={{...btnG,flex:2}}>{attendView===match.id?"접기":"출석 체크"}</button>
                    {isAdmin&&<button onClick={()=>{setResultEdit(resultEdit===match.id?null:match.id);setResultIn({our:match.result?.our??"",opp:match.result?.opp??""});}} style={{...btnG,flex:2}}>결과 {match.result?"수정":"입력"}</button>}
                    {isAdmin&&<button onClick={()=>{if(confirm("삭제할까요?"))db.ref("matches").set(matches.filter(x=>x.id!==match.id));}} style={{...btnG,flex:1,color:C.red}}>🗑️</button>}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {tab==="notice"&&(
          <div>
            <div style={{fontSize:18,fontWeight:900,marginBottom:16}}>📢 공지사항</div>
            {isAdmin&&<div style={{background:C.card,borderRadius:16,padding:16,marginBottom:14}}><textarea value={newNotice} onChange={e=>setNewNotice(e.target.value)} placeholder="공지 내용..." style={{...iS,minHeight:80,resize:"none",marginBottom:10}}/><button onClick={()=>{if(!newNotice.trim())return;const n={id:Date.now(),content:newNotice,author:user.name,time:"방금 전"};db.ref("notices").set([n,...notices]);addLog("공지 등록");setNewNotice("");}} style={btnT}>공지 올리기</button></div>}
            {notices.map(n=><div key={n.id} style={{background:C.card,borderRadius:16,padding:16,marginBottom:10,borderLeft:`3px solid ${C.teal}`,position:"relative"}}><div style={{fontSize:14,color:"#eee",lineHeight:1.6,paddingRight:30}}>{n.content}</div><div style={{fontSize:11,color:C.sub,marginTop:8}}>{n.author} · {n.time}</div>{isAdmin&&<button onClick={()=>db.ref("notices").set(notices.filter(x=>x.id!==n.id))} style={{position:"absolute",top:12,right:12,background:"none",border:"none",color:C.dim,fontSize:18,cursor:"pointer"}}>✕</button>}</div>)}
          </div>
        )}

      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#0d0d0d",borderTop:`1px solid ${C.border}`,display:"flex",padding:"6px 0 10px",zIndex:100}}>
        {[["home","⚽","홈"],["manage","📋","관리"],["match","📅","경기"],["notice","📢","공지"]].map(([key,icon,label])=>(
          <button key={key} onClick={()=>setTab(key)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 0"}}>
            <span style={{fontSize:22}}>{icon}</span>
            <span style={{fontSize:9,fontWeight:tab===key?700:400,color:tab===key?C.teal:C.dim}}>{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
